    <div class="container-logo p-2">
      <img src="logo1.png" class="rounded-pill" alt="">
    </div>
    <h1>Registered Pets</h1>

    <div id="pets">
      
    </div>

    <button onclick = "displayPets()" >Show Registered Pets</button>

    <section>
        <h2>New Pet Registration</h2>

        <form class="bg-warning-subtle border p-5 mt-5">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form=control" type="text" name="petName" id="" placeholder="Enter Name">
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input class="form=control" type="text" name="petAge" id="" placeholder="Enter Age">
            </div>

            <div class="mb-3">
                <label class="form-label">Breed</label>
                <input class="form=control" type="text" name="petBreed" id="" placeholder="Enter Breed">
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <input class="form=control" type="text" name="petGender" id="" placeholder="Enter Gender">
            </div>

            <div class="mb-3">
                <label class="form-label">Services</label>
                <select class="form-select" name="petService" id="">
                    <option value="">Select a Service</option>
                    <option value="Full Groom">Full Groom</option>
                    <option value="Nail Trim">Nail Trim</option>
                    <option value="Vaccines">Vaccines</option>
                </select>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-danger m-1" type="submit">Clear</button>
                <button onclick="registerPet(event)" class="btn btn-primary m-1" type="submit">Register</button>
            </div>



        </form>

    </section>

    <section>
    
      <table class="table table-bordered">
        <tr class="table table-bordered">
          
            <th>Name</th>
            <th>Age</th>
            <th>Breed</th>
            <th>Gender</th>
            <th>Service</th>
            <th>Delete</th>
            
      
        </tr>
        <tbody id="body">
            
        </tbody>
      </table>
    </section>

   
    <script src="./scripts/registration.js"></script>
