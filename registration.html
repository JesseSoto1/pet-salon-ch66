    <h1>Registered Pets</h1>

    <div id="pets">
      
    </div>

    <button onclick = "displayPets()" >Registered Pets</button>

    <section>
        <h2>Registration</h2>

        <form class="bg-light border p-5 mt-5">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form=control" type="text" name="petName" id="" placeholder="Enter Name">
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input class="form=control" type="text" name="petAge" id="" placeholder="Enter Age">
            </div>

            <div class="mb-3">
                <label class="form-label">Breed</label>
                <input class="form=control" type="text" name="petBreed" id="" placeholder="Enter Breed">
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <input class="form=control" type="text" name="petGender" id="" placeholder="Enter Gender">
            </div>

            <div class="mb-3">
                <label class="form-label">Services</label>
                <select class="form-select" name="petService" id="">
                    <option value="">Select a Service</option>
                    <option value="Full Groom">Full Groom</option>
                    <option value="Nail Trim">Nail Trim</option>
                    <option value="Vaccines">Vaccines</option>
                </select>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-danger m-1" type="submit">Clear</button>
                <button onclick="registerPet(event)" class="btn btn-primary m-1" type="submit">Register</button>
            </div>



        </form>

    </section>
